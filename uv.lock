version = 1
revision = 3
requires-python = ">=3.14"
resolution-markers = [
    "python_full_version >= '3.15'",
    "python_full_version < '3.15'",
]

[manifest]
members = [
    "3tears",
    "3tears-agent-acl",
    "3tears-agent-audit",
    "3tears-agent-identity",
    "3tears-agent-intention",
    "3tears-agent-knowledge",
    "3tears-agent-memory",
    "3tears-agent-skills",
    "3tears-agent-tools",
    "3tears-agent-wake",
    "3tears-agent-workspace",
    "3tears-backup",
    "3tears-channels",
    "3tears-conversations",
    "3tears-datasources",
    "3tears-enforcement",
    "3tears-epoch",
    "3tears-langgraph",
    "3tears-mcp",
    "3tears-media-contracts",
    "3tears-models",
    "3tears-nats",
    "3tears-object-store",
    "3tears-observe",
    "3tears-registry",
    "3tears-scheduled-jobs",
    "3tears-scrape",
]
constraints = [{ name = "lxml", specifier = ">=6.1.0,<7" }]

[manifest.dependency-groups]
dev = [
    { name = "aiohttp", specifier = ">=3.9" },
    { name = "anthropic", specifier = ">=0.94.0" },
    { name = "discord-py", specifier = ">=2.7" },
    { name = "duckdb", specifier = ">=1.0" },
    { name = "fastapi", specifier = ">=0.110" },
    { name = "freezegun", specifier = ">=1.5" },
    { name = "google-cloud-bigquery", specifier = ">=3.0" },
    { name = "httpx", specifier = ">=0.27" },
    { name = "hypothesis", specifier = ">=6.100" },
    { name = "langchain-anthropic", specifier = ">=1.4" },
    { name = "langchain-openai", specifier = ">=1.1" },
    { name = "langchain-voyageai", specifier = ">=0.3" },
    { name = "mypy", specifier = ">=1.8" },
    { name = "opentelemetry-api", specifier = ">=1.28" },
    { name = "opentelemetry-exporter-otlp", specifier = ">=1.28" },
    { name = "opentelemetry-sdk", specifier = ">=1.28" },
    { name = "pillow", specifier = ">=10.0" },
    { name = "pint", specifier = ">=0.25.2" },
    { name = "prometheus-client", specifier = ">=0.20" },
    { name = "pytest", specifier = ">=8.0" },
    { name = "pytest-asyncio", specifier = ">=0.23" },
    { name = "pytest-timeout", specifier = ">=2.3" },
    { name = "redshift-connector", specifier = ">=2.1" },
    { name = "ruff", specifier = ">=0.15.18" },
    { name = "simpleeval", specifier = ">=1.0.4" },
    { name = "slack-bolt", specifier = ">=1.28" },
    { name = "slack-sdk", specifier = ">=3.41" },
    { name = "snowflake-connector-python", specifier = ">=3.0" },
    { name = "testcontainers", extras = ["postgres"], specifier = ">=4.0" },
    { name = "trafilatura", specifier = ">=2.0.0" },
]

[[package]]
name = "3tears"
version = "0.17.9"
source = { editable = "packages/core" }
dependencies = [
    { name = "3tears-nats" },
    { name = "3tears-observe" },
    { name = "aiosqlite" },
    { name = "asyncpg" },
    { name = "cryptography" },
    { name = "httpx" },
    { name = "nats-py" },
    { name = "pydantic" },
    { name = "pyjwt", extra = ["crypto"] },
    { name = "sqlalchemy" },
]

[package.optional-dependencies]
duckdb = [
    { name = "duckdb" },
]
testing = [
    { name = "docker" },
    { name = "pytest" },
    { name = "testcontainers", extra = ["nats"] },
]
tracing = [
    { name = "opentelemetry-api" },
]

[package.metadata]
requires-dist = [
    { name = "3tears-nats", editable = "packages/nats" },
    { name = "3tears-observe", editable = "packages/observe" },
    { name = "aiosqlite" },
    { name = "asyncpg" },
    { name = "cryptography", specifier = ">=42" },
    { name = "docker", marker = "extra == 'testing'", specifier = ">=7.0" },
    { name = "duckdb", marker = "extra == 'duckdb'", specifier = ">=1.0" },
    { name = "httpx" },
    { name = "nats-py" },
    { name = "opentelemetry-api", marker = "extra == 'tracing'", specifier = ">=1.20" },
    { name = "pydantic" },
    { name = "pyjwt", extras = ["crypto"], specifier = ">=2.8" },
    { name = "pytest", marker = "extra == 'testing'", specifier = ">=8.0" },
    { name = "sqlalchemy" },
    { name = "testcontainers", extras = ["nats", "postgres"], marker = "extra == 'testing'", specifier = ">=4.0" },
]
provides-extras = ["tracing", "duckdb", "testing"]

