name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.14

      - name: Install dependencies
        run: uv sync --extra vision

      - name: Lint
        run: |
          uv run ruff check .
          uv run ruff format . --check

      - name: Typecheck
        env:
          MYPYPATH: packages/core/src:packages/agent/memory/src:packages/agent/tools/src
        run: uv run mypy --explicit-package-bases -p threetears.core -p threetears.agent.memory -p threetears.agent.tools

      - name: Test (unit + enforcement; integration excluded - no docker on the runner)
        run: uv run pytest packages/ tests/ -m "not integration" -v

  release:
    needs: check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.14

      - name: Verify version matches tag
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          # all 16 packages under packages/, including the agent-namespace
          # move sub-paths (agent/acl, agent/audit, agent/memory, agent/tools,
          # agent/workspace). every pyproject.toml under packages/ must be
          # at the exact tag version; otherwise the release is mismatched.
          MISMATCH=0
          for PKG_TOML in $(find packages -maxdepth 4 -name pyproject.toml | sort); do
            PKG_PATH="$(dirname "$PKG_TOML")"
            PKG_VERSION=$(grep '^version = ' "$PKG_TOML" | head -1 | sed 's/version = "\(.*\)"/\1/')
            if [ "$PKG_VERSION" != "$TAG" ]; then
              echo "Version mismatch in $PKG_PATH: expected $TAG, got $PKG_VERSION"
              MISMATCH=1
            fi
          done
          [ "$MISMATCH" -eq 0 ] || exit 1
          echo "All packages at version $TAG"

      - name: Build packages
        run: |
          pip install build
          for PKG_TOML in $(find packages -maxdepth 4 -name pyproject.toml | sort); do
            PKG_PATH="$(dirname "$PKG_TOML")"
            echo "Building $PKG_PATH..."
            python -m build "$PKG_PATH" --outdir dist/
          done

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          # Delete any pre-existing release for this tag (e.g. manually created)
          gh release delete "$TAG" --yes 2>/dev/null || true
          gh release create "$TAG" dist/* \
            --title "$TAG" \
            --generate-notes
