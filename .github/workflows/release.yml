name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.14

      - name: Install dependencies
        run: uv sync --extra vision

      - name: Lint
        run: |
          uv run ruff check .
          uv run ruff format . --check

      - name: Typecheck
        run: uv run mypy packages/core/src/ packages/agent-memory/src/ packages/agent-tools/src/

      - name: Test
        run: uv run pytest packages/core/tests/ packages/agent-memory/tests/ packages/agent-tools/tests/ -v

  release:
    needs: check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.14

      - name: Verify version matches tag
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          for PKG in core agent-memory agent-tools; do
            PKG_VERSION=$(grep '^version = ' "packages/$PKG/pyproject.toml" | head -1 | sed 's/version = "\(.*\)"/\1/')
            if [ "$PKG_VERSION" != "$TAG" ]; then
              echo "Version mismatch in packages/$PKG: expected $TAG, got $PKG_VERSION"
              exit 1
            fi
          done
          echo "All packages at version $TAG"

      - name: Build packages
        run: |
          pip install build
          for PKG in core agent-memory agent-tools; do
            echo "Building packages/$PKG..."
            python -m build "packages/$PKG" --outdir dist/
          done

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          # Delete any pre-existing release for this tag (e.g. manually created)
          gh release delete "$TAG" --yes 2>/dev/null || true
          gh release create "$TAG" dist/* \
            --title "$TAG" \
            --generate-notes
