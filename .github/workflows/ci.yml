name: CI

on:
  pull_request:
    branches: [develop]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: astral-sh/setup-uv@v8.2.0
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.14

      - name: Install dependencies
        run: uv sync --extra vision

      - name: Lint
        run: |
          uv run ruff check .
          uv run ruff format . --check

      - name: Typecheck
        # single source of truth for the mypy target set (avoids CI/local drift).
        run: ./scripts/typecheck.sh

      - name: Test (unit + enforcement; integration excluded - no docker on the runner)
        run: uv run pytest packages/ tests/ -m "not integration" -v
