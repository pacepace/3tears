name: CI

on:
  pull_request:
    branches: [develop]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: astral-sh/setup-uv@v8.2.0
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.14

      - name: Install dependencies
        run: uv sync --extra vision

      - name: Lint
        run: |
          uv run ruff check .
          uv run ruff format . --check

      - name: Typecheck
        env:
          # the agent-namespace move (packages/agent-memory -> packages/agent/memory)
          # nests src/ two levels deep which mypy cannot resolve from file
          # paths without --explicit-package-bases + an MYPYPATH that lists
          # each src/ root. addressing the modules by ``-p threetears.<x>``
          # is the documented escape and matches the layout that
          # ``uv run mypy`` resolves from the installed-editable
          # environment.
          MYPYPATH: packages/core/src:packages/agent/memory/src:packages/agent/intention/src:packages/agent/skills/src:packages/agent/tools/src:packages/agent/wake/src:packages/datasources/src
        run: uv run mypy --explicit-package-bases -p threetears.core -p threetears.agent.memory -p threetears.agent.intention -p threetears.agent.skills -p threetears.agent.tools -p threetears.agent.wake -p threetears.datasources

      - name: Test (unit + enforcement; integration excluded - no docker on the runner)
        run: uv run pytest packages/ tests/ -m "not integration" -v
