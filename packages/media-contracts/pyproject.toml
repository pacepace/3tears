[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "3tears-media-contracts"
version = "0.12.1"
description = "Dependency-free media capability contracts shared by 3tears providers and tools"
readme = "README.md"
requires-python = ">=3.14"
authors = [{name = "pace"}]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Framework :: AsyncIO",
    "Intended Audience :: Developers",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.14",
    "Topic :: Software Development :: Libraries",
    "Typing :: Typed",
]
# contracts package: stays dependency-free by design, enforced by the
# contract-purity check in tests/enforcement/. implementations and
# consumers both depend on this package; it depends on nothing.
dependencies = []

[project.urls]
Repository = "https://github.com/pacepace/3tears"

[tool.hatch.build.targets.wheel]
packages = ["src/threetears"]
