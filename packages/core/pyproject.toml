[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "3tears"
version = "0.1.0"
requires-python = ">=3.11"
dependencies = [
    "sqlalchemy",
    "asyncpg",
    "nats-py",
    "aiosqlite",
]

[project.optional-dependencies]
tracing = ["opentelemetry-api>=1.20"]
duckdb = ["duckdb>=1.0"]

[tool.hatch.build.targets.wheel]
packages = ["src/threetears"]
