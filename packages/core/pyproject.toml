[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "3tears"
version = "0.13.8"
description = "Three-tier caching framework for Python -- L1 SQLite, L2 NATS KV, L3 PostgreSQL"
readme = "README.md"
requires-python = ">=3.14"
authors = [{name = "pace"}]
license = "MIT"
license-files = ["LICENSE"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Framework :: AsyncIO",
    "Intended Audience :: Developers",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.14",
    "Topic :: Database",
    "Topic :: Software Development :: Libraries",
    "Typing :: Typed",
]
dependencies = [
    "3tears-observe",
    "3tears-nats",
    "sqlalchemy",
    "asyncpg",
    "nats-py",
    "aiosqlite",
    "pydantic",
    "cryptography>=42",  # AES-256-GCM encryption-at-rest (core.security.encryption)
    "pyjwt[crypto]>=2.8",  # EdDSA-signed identity tokens (core.security.identity_token)
]

[project.optional-dependencies]
tracing = ["opentelemetry-api>=1.20"]
duckdb = ["duckdb>=1.0"]
# pulled by anything importing :mod:`threetears.core.testing.fixtures`
# (the centralized testcontainer harness for downstream integration
# tests). lazy-imported inside fixture bodies so the rest of
# threetears.core stays free of these deps; the optional-extras
# declaration just gives consumers a one-line dep request:
# ``3tears[testing]`` in their dev / test extras.
testing = [
    "testcontainers[nats,postgres]>=4.0",
    "docker>=7.0",
    "pytest>=8.0",
]

[project.urls]
Repository = "https://github.com/pacepace/3tears"

[tool.hatch.build.targets.wheel]
packages = ["src/threetears"]

[tool.uv.sources]
3tears-observe = { workspace = true }
3tears-nats = { workspace = true }
