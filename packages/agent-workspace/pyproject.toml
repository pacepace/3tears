[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "3tears-agent-workspace"
version = "0.1.0"
description = "workspace primitives for 3tears agents: workspace entities, sandbox, format handlers, tools"
readme = "README.md"
requires-python = ">=3.14"
authors = [{name = "pace"}]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Framework :: AsyncIO",
    "Intended Audience :: Developers",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.14",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
    "Topic :: Software Development :: Libraries",
    "Typing :: Typed",
]
dependencies = [
    "3tears",
    "3tears-agent-acl",
    "3tears-agent-audit",
    "3tears-agent-tools",
    "pydantic>=2.0",
    "ruamel.yaml>=0.18",
    "jsonpath-ng>=1.6",
    "watchfiles>=1.1.1",
]

[project.urls]
Repository = "https://github.com/pacepace/3tears"

[tool.hatch.build.targets.wheel]
packages = ["src/threetears"]

[tool.uv.sources]
3tears = { workspace = true }
3tears-agent-acl = { workspace = true }
3tears-agent-audit = { workspace = true }
3tears-agent-tools = { workspace = true }

[tool.mypy]
strict = true
mypy_path = "src"
packages = ["threetears.agent.workspace"]
explicit_package_bases = true
ignore_missing_imports = true

[tool.pytest.ini_options]
asyncio_mode = "auto"
markers = [
    "integration: integration tests requiring docker or real infra",
]
