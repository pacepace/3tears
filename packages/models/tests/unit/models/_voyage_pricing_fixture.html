<!doctype html><html><head><title>Voyage pricing (trimmed fixture)</title></head><body><script id="ssr-props" type="application/json">{"page":{"title":"Pricing","body":"<p>Voyage model pricing is usage-based.</p>\n<h1 class=\"heading heading-1 header-scroll\"><div class=\"heading-anchor anchor waypoint\" id=\"text-embeddings\"></div><div class=\"heading-text\">Text Embeddings</div><a aria-label=\"Skip link to Text Embeddings\" class=\"heading-anchor-icon fa fa-regular fa-anchor\" href=\"#text-embeddings\"></a></h1>\n<p>We charge for requests to the Voyage text embedding endpoint based on the number of tokens in the documents/queries. The first 200 million tokens for <code class=\"rdmd-code lang- theme-undefined\" data-lang=\"\">voyage-4-large</code>, <code class=\"rdmd-code lang- theme-undefined\" data-lang=\"\">voyage-4</code>, <code class=\"rdmd-code lang- theme-undefined\" data-lang=\"\">voyage-4-lite</code>, <code class=\"rdmd-code lang- theme-undefined\" data-lang=\"\">voyage-context-3</code>, and <code class=\"rdmd-code lang- theme-undefined\" data-lang=\"\">voyage-code-3</code>, or the first 50 million tokens for <code class=\"rdmd-code lang- theme-undefined\" data-lang=\"\">voyage-multilingual-2</code>, <code class=\"rdmd-code lang- theme-undefined\" data-lang=\"\">voyage-finance-2</code>, <code class=\"rdmd-code lang- theme-undefined\" data-lang=\"\">voyage-law-2</code>, and <code class=\"rdmd-code lang- theme-undefined\" data-lang=\"\">voyage-code-2</code>, are free for every account. Subsequent usage is priced per token, as shown in the following table.</p>\n<div class=\"rdmd-table\"><div class=\"rdmd-table-inner\"><table><thead><tr><th>Model</th><th>Price per thousand tokens</th><th>Price per million tokens</th><th>Number of free tokens</th></tr></thead><tbody><tr><td><code class=\"rdmd-code lang- theme-undefined\" data-lang=\"\">voyage-4-large</code></td><td>$0.00012</td><td>$0.12</td><td>200 million</td></tr><tr><td><code class=\"rdmd-code lang- theme-undefined\" data-lang=\"\">voyage-4</code></td><td>$0.00006</td><td>$0.06</td><td>200 million</td></tr><tr><td><code class=\"rdmd-code lang- theme-undefined\" data-lang=\"\">voyage-4-lite</code></td><td>$0.00002</td><td>$0.02</td><td>200 million</td></tr><tr><td><code class=\"rdmd-code lang- theme-undefined\" data-lang=\"\">voyage-context-3</code></td><td>$0.00018</td><td>$0.18</td><td>200 million</td></tr><tr><td><code class=\"rdmd-code lang- theme-undefined\" data-lang=\"\">voyage-code-3</code></td><td>$0.00018</td><td>$0.18</td><td>200 million</td></tr><tr><td><code class=\"rdmd-code lang- theme-undefined\" data-lang=\"\">voyage-finance-2</code><br/><code class=\"rdmd-code lang- theme-undefined\" data-lang=\"\">voyage-law-2</code><br/><code class=\"rdmd-code lang- theme-undefined\" data-lang=\"\">voyage-code-2</code></td><td>$0.00012</td><td>$0.12</td><td>50 million</td></tr></tbody></table></div></div>\n\n<h1 class=\"heading heading-1 header-scroll\"><div class=\"heading-anchor anchor waypoint\" id=\"rerankers\"></div><div class=\"heading-text\">Rerankers</div><a aria-label=\"Skip link to Rerankers\" class=\"heading-anchor-icon fa fa-regular fa-anchor\" href=\"#rerankers\"></a></h1>\n<p>Pricing for the Voyage reranker endpoint is based on the total number of processed tokens, calculated as \u201c(the number of query tokens \u00d7 the number of documents) + sum of the number of tokens in all documents.\u201d The first 200 million tokens for <code class=\"rdmd-code lang- theme-undefined\" data-lang=\"\">rerank-2.5</code>, <code class=\"rdmd-code lang- theme-undefined\" data-lang=\"\">rerank-2.5-lite</code>, <code class=\"rdmd-code lang- theme-undefined\" data-lang=\"\">rerank-2</code>,\u00a0and <code class=\"rdmd-code lang- theme-undefined\" data-lang=\"\">rerank-2-lite</code> are free for each account. Subsequent usage is priced per token, as shown in the following table.</p>\n<div class=\"rdmd-table\"><div class=\"rdmd-table-inner\"><table><thead><tr><th>Model</th><th>Price per thousand tokens</th><th>Price per million tokens</th><th>Estimated price per request*</th><th>Number of free tokens</th></tr></thead><tbody><tr><td><code class=\"rdmd-code lang- theme-undefined\" data-lang=\"\">rerank-2.5</code></td><td>$0.00005</td><td>$0.05</td><td>$0.0025</td><td>200 million</td></tr><tr><td><code class=\"rdmd-code lang- theme-undefined\" data-lang=\"\">rerank-2.5-lite</code></td><td>$0.00002</td><td>$0.02</td><td>$0.001</td><td>200 million</td></tr></tbody></table></div></div>"}}</script></body></html>
