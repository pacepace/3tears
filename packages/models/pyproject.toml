[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "3tears-models"
version = "0.5.0"
description = "AI model provider protocols, capabilities, and result types for the 3tears platform"
requires-python = ">=3.14"
authors = [{name = "pace"}]
dependencies = [
    "3tears-observe",
    "3tears-agent-tools",
    "pydantic>=2.0",
]

[project.optional-dependencies]
anthropic = ["langchain-anthropic>=0.3"]
openai = ["langchain-openai>=0.3"]
openrouter = ["langchain-openrouter>=0.1"]
voyageai = ["langchain-voyageai>=0.2"]
whisper = ["httpx>=0.27"]
image = ["httpx>=0.27"]

[project.urls]
Repository = "https://github.com/pacepace/3tears"

[tool.hatch.build.targets.wheel]
packages = ["src/threetears"]

[tool.uv.sources]
3tears-observe = { workspace = true }
3tears-agent-tools = { workspace = true }
