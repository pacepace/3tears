[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "3tears-models"
version = "0.17.6"
description = "LangChain-native AI model factories with capability metadata, circuit breakers, and usage tracking for the 3tears platform"
readme = "README.md"
requires-python = ">=3.14"
authors = [{name = "pace"}]
license = "MIT"
license-files = ["LICENSE"]
dependencies = [
    "3tears-media-contracts",
    "3tears-observe",
    "pydantic>=2.0",
    "langchain-core>=0.3",
    "langchain-anthropic>=1.4",
    "langchain-openai>=1.1",
    "langchain-openrouter>=0.1",
]

[project.optional-dependencies]
# Claude Pro/Max SUBSCRIPTION as a chat model (the anthropic provider routes an OAuth `sk-ant-oat…`
# token here instead of the HTTP API). Pulls langchain-claude-code → claude-agent-sdk; needs Node +
# the Claude Code CLI on PATH at runtime. Imported lazily in providers/_claude_cli.py.
# 3tears-langgraph is here (not in the base dependencies) purely for its typed tool-event classes +
# dispatch_event helper -- reused so a subscription-backed turn's tool calls surface through the
# SAME event shape node-path tools already emit, with no new event vocabulary for consumers to
# learn. Only the claude-cli path needs it; the rest of 3tears-models has no graph-orchestration
# awareness and shouldn't gain one just for this.
claude-cli = ["langchain-claude-code>=0.1.0", "3tears-langgraph"]
voyageai = ["langchain-voyageai>=0.3"]
whisper = ["httpx>=0.27"]
image = ["httpx>=0.27"]
prometheus = ["prometheus-client>=0.20"]

[project.urls]
Repository = "https://github.com/pacepace/3tears"

[tool.hatch.build.targets.wheel]
packages = ["src/threetears"]

[tool.uv.sources]
3tears-media-contracts = { workspace = true }
3tears-observe = { workspace = true }
3tears-langgraph = { workspace = true }
