services:
  nodriver-sidecar:
    build: .
    image: nodriver-sidecar:latest
    container_name: nodriver-sidecar
    # Chromium under Xvfb needs real shared memory; the Docker default (64mb)
    # crashes the renderer process under real page loads.
    shm_size: 2gb
    ports:
      - "8088:8088"
    environment:
      SCREEN_GEOM: "1920x1080x24"
      PORT: "8088"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8088/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped
