[project]
name = "nodriver-sidecar"
version = "0.1.0"
description = "Thin HTTP wrapper around nodriver + Xvfb -- AGPL-3.0, never imported into 3tears-scrape's MIT tree."
requires-python = ">=3.12"
dependencies = [
    "nodriver>=0.50,<0.51",
    "fastapi>=0.115,<0.116",
    "uvicorn[standard]>=0.32,<0.33",
]

[dependency-groups]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.23",
    "httpx>=0.27",
]

[tool.uv]
package = false

[tool.pytest.ini_options]
asyncio_mode = "auto"
