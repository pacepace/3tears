[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "3tears-agent-memory"
version = "0.1.0"
requires-python = ">=3.11"
dependencies = [
    "3tears",
    "pgvector",
    "langchain-core",
]

[tool.hatch.build.targets.wheel]
packages = ["src/threetears"]

[tool.uv.sources]
3tears = { workspace = true }
