[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "3tears-scheduled-jobs"
version = "0.16.1"
description = "Generic, payload-agnostic, multipod-safe scheduled-jobs core -- cross-pod-locked tick engine, reschedule math, store protocols, and a default kind+payload store"
readme = "README.md"
requires-python = ">=3.14"
authors = [{name = "pace"}]
license = "MIT"
license-files = ["LICENSE"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Framework :: AsyncIO",
    "Intended Audience :: Developers",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.14",
    "Topic :: Software Development :: Libraries",
    "Typing :: Typed",
]
dependencies = [
    "3tears",
    "3tears-nats",
    "3tears-observe",
    "uuid-utils",
    # APScheduler is used as a pure utility ONLY by the ``cron`` schedule
    # branch in ``compute_next_fire_at`` (lazy local import inside that one
    # branch -- non-cron consumers pay zero import cost). Hard dep rather
    # than an extra so the public ``ScheduleType`` Literal (which includes
    # ``'cron'``) Just Works without extras-install ceremony. Consumers are
    # still free to drive the tick body with any scheduler they choose; the
    # platform does not own APScheduler integration.
    "apscheduler>=3.10",
]

[project.optional-dependencies]
# ``prometheus_client`` is optional at runtime -- the metrics module
# degrades gracefully to no-op when the wheel is absent (mirrors
# ``3tears-models``'s ``prometheus`` extra). Consumers that want the
# locked ``3tears_scheduled_jobs_*`` instruments install the extra.
prometheus = ["prometheus-client>=0.20"]

[project.urls]
Repository = "https://github.com/pacepace/3tears"

[tool.hatch.build.targets.wheel]
packages = ["src/threetears"]

[tool.uv.sources]
3tears = { workspace = true }
3tears-nats = { workspace = true }
3tears-observe = { workspace = true }

[tool.mypy]
strict = true
mypy_path = "src"
packages = ["threetears.scheduled_jobs"]
explicit_package_bases = true
ignore_missing_imports = true

# no [tool.pytest.ini_options] block: pytest's rootdir detection picks
# the closest pyproject with [tool.pytest.ini_options], so a per-package
# block hides the workspace-level conftest.py and unregisters the
# canonical ``pytest_plugins`` line. inherit from the workspace instead.
