[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "3tears-nats"
version = "0.12.2"
description = "Typed NATS client wrapper, subject builders, and JetStream KV bucket primitives for 3tears applications"
readme = "README.md"
requires-python = ">=3.14"
authors = [{name = "pace"}]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Framework :: AsyncIO",
    "Intended Audience :: Developers",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.14",
    "Topic :: System :: Networking",
    "Topic :: Software Development :: Libraries",
    "Typing :: Typed",
]
dependencies = [
    "3tears-observe",
    "nats-py>=2.10",
    "pydantic>=2.10",
]

[project.urls]
Repository = "https://github.com/pacepace/3tears"

[tool.hatch.build.targets.wheel]
packages = ["src/threetears"]

[tool.uv.sources]
3tears-observe = { workspace = true }
