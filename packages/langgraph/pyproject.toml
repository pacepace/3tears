[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "3tears-langgraph"
version = "0.13.10"
description = "Three-tier LangGraph checkpoint saver: L1 SQLite -> L2 NATS KV -> L3 PostgreSQL"
readme = "README.md"
requires-python = ">=3.14"
authors = [{name = "pace"}]
license = "MIT"
license-files = ["LICENSE"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Framework :: AsyncIO",
    "Intended Audience :: Developers",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.14",
    "Topic :: Database",
    "Topic :: Software Development :: Libraries",
    "Typing :: Typed",
]
dependencies = [
    "3tears",
    "3tears-observe",
    "langchain-core>=1.0",
    "langgraph>=0.4",
    "langgraph-checkpoint>=4.0",
    "asyncpg",
    "uuid-utils",
]

[project.urls]
Repository = "https://github.com/pacepace/3tears"

[tool.hatch.build.targets.wheel]
packages = ["src/threetears"]

[tool.uv.sources]
3tears = { workspace = true }
3tears-observe = { workspace = true }

[tool.mypy]
strict = true
mypy_path = "src"
packages = ["threetears.langgraph"]
explicit_package_bases = true
ignore_missing_imports = true
