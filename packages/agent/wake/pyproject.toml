[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "3tears-agent-wake"
version = "0.9.0"
description = "Long-running-agent foundation -- wake schedules, fires, webhook subscriptions"
readme = "README.md"
requires-python = ">=3.14"
authors = [{name = "pace"}]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Framework :: AsyncIO",
    "Intended Audience :: Developers",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.14",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
    "Topic :: Software Development :: Libraries",
    "Typing :: Typed",
]
dependencies = [
    "3tears",
    "3tears-agent-skills",
    "uuid-utils",
    # APScheduler is used as a pure utility ONLY by the ``cron`` schedule
    # branch in ``_compute_next_fire_at`` (lazy local import). Consumers
    # are still free to drive the tick body with any scheduler they
    # choose; the platform does not own APScheduler integration.
    "apscheduler>=3.10",
]

[project.urls]
Repository = "https://github.com/pacepace/3tears"

[tool.hatch.build.targets.wheel]
packages = ["src/threetears"]

[tool.uv.sources]
3tears = { workspace = true }
"3tears-agent-skills" = { workspace = true }
