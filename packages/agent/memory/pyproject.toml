[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "3tears-agent-memory"
version = "0.11.0"
description = "Memory system for LLM agents — extraction, retrieval, hybrid search, and MMR reranking"
readme = "README.md"
requires-python = ">=3.14"
authors = [{name = "pace"}]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Framework :: AsyncIO",
    "Intended Audience :: Developers",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.14",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Programming Language :: Python :: 3.14",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
    "Topic :: Software Development :: Libraries",
    "Typing :: Typed",
]
dependencies = [
    "3tears",
    "3tears-agent-acl",
    "3tears-langgraph",
    "3tears-observe",
    "pgvector",
    "langchain-core",
]

[project.urls]
Repository = "https://github.com/pacepace/3tears"

[tool.hatch.build.targets.wheel]
packages = ["src/threetears"]

[tool.uv.sources]
3tears = { workspace = true }
3tears-agent-acl = { workspace = true }
3tears-langgraph = { workspace = true }
3tears-observe = { workspace = true }
