[tool.uv.workspace]
members = ["packages/*"]

[tool.uv]
dev-dependencies = [
    "pytest>=8.0",
    "pytest-asyncio>=0.23",
    "mypy>=1.8",
    "ruff>=0.3",
    "opentelemetry-api>=1.28",
    "opentelemetry-sdk>=1.28",
    "opentelemetry-exporter-otlp>=1.28",
    "duckdb>=1.0",
    "simpleeval>=1.0.4",
    "pint>=0.25.2",
    "trafilatura>=2.0.0",
    "pillow>=10.0",
]

[tool.ruff]
line-length = 120
target-version = "py314"

[tool.pytest.ini_options]
addopts = "--import-mode=importlib"
asyncio_mode = "auto"

[tool.mypy]
strict = true
python_version = "3.14"
namespace_packages = true
explicit_package_bases = true
mypy_path = [
    "packages/core/src",
    "packages/agent-memory/src",
    "packages/agent-tools/src",
    "packages/channels/src",
    "packages/observe/src",
    "packages/langgraph/src",
]

[[tool.mypy.overrides]]
module = [
    "pgvector.*",
    "simpleeval",
    "fitz",
    "pdf2image",
    "pytesseract",
    "docx",
    "openpyxl",
    "openpyxl.*",
    "pint",
    "slack_bolt.*",
    "slack_sdk.*",
    "discord",
    "discord.*",
]
ignore_missing_imports = true

# Suppress import-untyped for installed third-party libs without stubs
[[tool.mypy.overrides]]
module = [
    "threetears.core.cache.sqlite",
    "threetears.core.cache.duckdb",
    "threetears.agent.tools.document",
    "threetears.agent.tools.builtin.calculator",
]
disable_error_code = ["import-untyped"]

# Suppress no-untyped-call for modules calling into untyped third-party channel libraries
[[tool.mypy.overrides]]
module = [
    "threetears.channels.slack",
    "threetears.channels.discord",
]
disable_error_code = ["no-untyped-call"]
