[tool.uv.workspace]
members = ["packages/*"]

[tool.uv]
dev-dependencies = [
    "pytest>=8.0",
    "pytest-asyncio>=0.23",
    "mypy>=1.8",
    "ruff>=0.3",
    "opentelemetry-api>=1.20",
    "duckdb>=1.0",
    "simpleeval>=1.0.4",
    "pint>=0.25.2",
    "trafilatura>=2.0.0",
]

[tool.ruff]
line-length = 120
target-version = "py311"

[tool.pytest.ini_options]
addopts = "--import-mode=importlib"
asyncio_mode = "auto"

[tool.mypy]
strict = true
python_version = "3.11"
