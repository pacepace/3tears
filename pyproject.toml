[tool.uv.workspace]
members = ["packages/*"]

[tool.uv]
dev-dependencies = [
    "pytest>=8.0",
    "pytest-asyncio>=0.23",
    "mypy>=1.8",
    "ruff>=0.3",
    "opentelemetry-api>=1.28",
    "opentelemetry-sdk>=1.28",
    "opentelemetry-exporter-otlp>=1.28",
    "duckdb>=1.0",
    "simpleeval>=1.0.4",
    "pint>=0.25.2",
    "trafilatura>=2.0.0",
    "pillow>=10.0",
    "anthropic>=0.94.0",
    # optional model-provider adapters installed in dev so their test suites
    # exercise the real langchain integrations rather than getting skipped.
    "langchain-anthropic>=1.4",
    "langchain-openai>=1.1",
    "langchain-voyageai>=0.3",
    # channel adapters installed in dev so the channels test suite exercises
    # the real slack/discord libraries.
    "slack-bolt>=1.28",
    "slack-sdk>=3.41",
    "aiohttp>=3.9",
    "discord.py>=2.7",
    # testcontainers used by the migration runner integration tests to
    # exercise real Postgres (rollback semantics cannot be verified
    # against the in-memory FakeDataStore).
    "testcontainers[postgres]>=4.0",
]

[tool.ruff]
line-length = 120
target-version = "py314"

[tool.ruff.lint]
select = ["SLF"]

[tool.ruff.lint.per-file-ignores]
# OpenTelemetry SDK >=1.39 guards set_tracer_provider behind an internal
# once-flag with no public reset; resetting _TRACER_PROVIDER_SET_ONCE._done
# is the only way to re-init the provider (required for tests and re-init
# flows). paired entry lives in tests/enforcement/_underscore_exemptions.txt.
"packages/observe/src/threetears/observe/setup.py" = ["SLF001"]
# sys._getframe is the stdlib's documented API for call-site frame access;
# the public sys.settrace alternative has different semantics. paired entry
# lives in tests/enforcement/_underscore_exemptions.txt.
"packages/observe/src/threetears/observe/logging.py" = ["SLF001"]
# test monkeypatches module-level _otel_available cache sentinel to exercise
# both the "otel installed" and "otel missing" branches; the sentinel is an
# import-time implementation anchor with no public accessor (would become a
# new public api surface just for tests; no library caller needs it). paired
# entries live in tests/enforcement/_underscore_exemptions.txt.
"packages/observe/tests/test_tracing.py" = ["SLF001"]
# test monkeypatches module-level _HAS_DUCKDB import-availability sentinel to
# force the ImportError branch without uninstalling the duckdb package.
# Analogous to _otel_available above: a stable import-time anchor that tests
# legitimately observe; no public accessor warranted. paired entry lives in
# tests/enforcement/_underscore_exemptions.txt.
"packages/core/tests/test_duckdb_backend.py" = ["SLF001"]
# autouse fixture clears the module-level _RESOLVED cache between tests so
# import-order does not leak stub-resolved entries across cases. the cache
# itself is an import-time implementation-stable anchor for the
# import-at-most-once contract; no public clear-cache helper on the module
# because the only legitimate caller is this test fixture. paired entry
# lives in tests/enforcement/_underscore_exemptions.txt.
"packages/agent-workspace/tests/unit/test_validators.py" = ["SLF001"]

[tool.pytest.ini_options]
addopts = "--import-mode=importlib"
asyncio_mode = "auto"
markers = [
    "integration: marks tests that require docker-backed services; run with -m integration",
]

[tool.mypy]
strict = true
python_version = "3.14"
namespace_packages = true
explicit_package_bases = true
mypy_path = [
    "packages/core/src",
    "packages/agent-acl/src",
    "packages/agent-audit/src",
    "packages/agent-memory/src",
    "packages/agent-tools/src",
    "packages/agent-workspace/src",
    "packages/channels/src",
    "packages/conversations/src",
    "packages/models/src",
    "packages/nats/src",
    "packages/observe/src",
    "packages/langgraph/src",
    "packages/registry/src",
]
# default scope when invoked with no arguments; avoids duplicate-module errors
# from the per-package tests/ trees (each has an enforcement/ package).
files = [
    "packages/core/src",
    "packages/agent-acl/src",
    "packages/agent-audit/src",
    "packages/agent-memory/src",
    "packages/agent-tools/src",
    "packages/agent-workspace/src",
    "packages/channels/src",
    "packages/conversations/src",
    "packages/models/src",
    "packages/nats/src",
    "packages/observe/src",
    "packages/langgraph/src",
    "packages/registry/src",
]
exclude = [
    "^packages/[^/]+/tests/",
]

[[tool.mypy.overrides]]
module = [
    "pgvector.*",
    "simpleeval",
    "fitz",
    "pdf2image",
    "pytesseract",
    "docx",
    "openpyxl",
    "openpyxl.*",
    "pint",
    "slack_bolt.*",
    "slack_sdk.*",
    "discord",
    "discord.*",
    "asyncpg",
    "asyncpg.*",
    "langchain_anthropic",
    "langchain_anthropic.*",
    "langchain_openai",
    "langchain_openai.*",
    "langchain_openrouter",
    "langchain_openrouter.*",
    "langchain_voyageai",
    "langchain_voyageai.*",
    "jsonpath_ng",
    "jsonpath_ng.*",
]
ignore_missing_imports = true

# Suppress import-untyped for installed third-party libs without stubs
[[tool.mypy.overrides]]
module = [
    "threetears.core.cache.sqlite",
    "threetears.core.cache.duckdb",
    "threetears.agent.tools.document",
    "threetears.agent.tools.builtin.calculator",
]
disable_error_code = ["import-untyped"]

# Suppress no-untyped-call for modules calling into untyped third-party channel libraries
[[tool.mypy.overrides]]
module = [
    "threetears.channels.slack",
    "threetears.channels.discord",
]
disable_error_code = ["no-untyped-call"]
